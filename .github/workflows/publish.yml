name: Publish

on:
  push:
    tags:
      - 'v*'
      - 'latest'

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  NUGET_PACKAGES: ${{ github.workspace }}\.nuget\packages

jobs:
  publish:
    runs-on: windows-latest
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Determine package version
        id: version
        shell: pwsh
        run: |
          [xml]$project = Get-Content 'src\NUglify\NUglify.csproj'
          $baseVersion = $project.Project.PropertyGroup.Version
          $packageVersion = $baseVersion

          if ("${{ github.ref_name }}" -eq "latest") {
            $suffix = "pre{0:000}" -f [int]${{ github.run_number }}
            $packageVersion = "$baseVersion-$suffix"
          }
          elseif ("${{ github.ref_name }}" -like "v*") {
            $packageVersion = "${{ github.ref_name }}".Substring(1)
          }

          "package_version=$packageVersion" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore NUglify.slnx

      - name: Build
        run: dotnet build NUglify.slnx -c Release --no-restore -p:UseSharedCompilation=false

      - name: Test
        run: dotnet test src\NUglify.Tests\NUglify.Tests.csproj -c Release --no-build -p:UseSharedCompilation=false

      - name: Pack
        shell: pwsh
        run: |
          $arguments = @(
            'pack',
            'src\NUglify\NUglify.csproj',
            '-c', 'Release',
            '-o', 'artifacts\packages',
            '--no-build',
            "/p:PackageVersion=${{ steps.version.outputs.package_version }}"
          )

          dotnet @arguments

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: nupkg
          path: artifacts/packages/*
          if-no-files-found: error

      - name: Publish package to NuGet.org
        if: env.NUGET_API_KEY != ''
        shell: pwsh
        run: |
          $packages = @(Get-ChildItem 'artifacts/packages/*.nupkg' -File)

          if ($packages.Count -eq 0) {
            throw "No .nupkg files found in artifacts/packages"
          }

          if ($packages.Count -ne 1) {
            throw "Expected exactly one .nupkg file in artifacts/packages but found $($packages.Count)"
          }

          dotnet nuget push $packages[0].FullName `
            --api-key "$env:NUGET_API_KEY" `
            --source "https://api.nuget.org/v3/index.json" `
            --skip-duplicate
