name: Publish

on:
  push:
    tags:
      - 'v*'
      - 'latest'

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  NUGET_PACKAGES: ${{ github.workspace }}\.nuget\packages

jobs:
  publish:
    runs-on: windows-latest
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          cache: true

      - name: Determine package version
        id: version
        shell: pwsh
        run: |
          $suffix = ""

          if ("${{ github.ref_name }}" -eq "latest") {
            $suffix = "pre{0:000}" -f [int]${{ github.run_number }}
          }

          "suffix=$suffix" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore NUglify.slnx

      - name: Build
        run: dotnet build NUglify.slnx -c Release --no-restore -p:UseSharedCompilation=false

      - name: Test
        run: dotnet test src\NUglify.Tests\NUglify.Tests.csproj -c Release --no-build -p:UseSharedCompilation=false

      - name: Pack
        shell: pwsh
        run: |
          $arguments = @(
            'pack',
            'src\NUglify\NUglify.csproj',
            '-c', 'Release',
            '-o', 'artifacts\packages',
            '--no-build'
          )

          if ("${{ steps.version.outputs.suffix }}") {
            $arguments += "/p:VersionSuffix=${{ steps.version.outputs.suffix }}"
          }

          dotnet @arguments

      - name: Upload package artifact
        uses: actions/upload-artifact@v7
        with:
          name: nupkg
          path: artifacts/packages/*
          if-no-files-found: error

      - name: Publish package to NuGet.org
        if: env.NUGET_API_KEY != ''
        shell: pwsh
        run: >
          dotnet nuget push "artifacts/packages/*.nupkg"
          --api-key "$env:NUGET_API_KEY"
          --source "https://api.nuget.org/v3/index.json"
          --skip-duplicate
